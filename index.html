
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventMaster Display</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, "Noto Sans TC", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: #000;
    }
    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .tabular-nums {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    /* Optical centering: large digits can look slightly right-shifted. */
    .optical-center {
      transform: translateX(-1.6vw);
    }
    @media (max-width: 900px) {
      .optical-center {
        transform: translateX(-2.6vw);
      }
    }

    .fade-in {
      animation: fadein 220ms ease-out forwards;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    .flash {
      animation: flash-attention 2.8s ease-in-out infinite;
      will-change: transform, filter;
    }
    @keyframes flash-attention {
      0%, 100% {
        background-color: #FCD34D;
        color: #000;
        transform: scale(1);
        filter: brightness(1);
      }
      20% {
        background-color: #FCD34D;
        color: #000;
        transform: scale(1);
        filter: brightness(1);
      }
      50% {
        background-color: #F59E0B;
        color: #000;
        transform: scale(1.005);
        filter: brightness(1.08);
      }
      80% {
        background-color: #FCD34D;
        color: #000;
        transform: scale(1);
        filter: brightness(1);
      }
    }

    /* Breathe animation for countdown effect */
    @keyframes breathe-soft {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .breathe {
      animation: breathe-soft 1.2s ease-in-out infinite;
      will-change: transform;
    }

    .top-right {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      opacity: 0;
      transition: opacity 200ms ease;
      display: flex;
      gap: 10px;
      pointer-events: none;
    }
    body:hover .top-right {
      opacity: 1;
    }

    .pill {
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25);
      color: #fff;
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      user-select: none;
    }
    .pill:active { transform: scale(0.98); }

    .start-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 100;
      background: radial-gradient(1200px 600px at 20% 20%, rgba(59,130,246,0.20), transparent),
                  radial-gradient(1200px 600px at 80% 80%, rgba(255,255,255,0.08), transparent),
                  rgba(0,0,0,0.85);
      color: #fff;
    }
    .start-card {
      width: min(920px, calc(100vw - 40px));
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding: 28px;
      backdrop-filter: blur(16px);
    }
    .start-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 10px 0;
    }
    .start-desc {
      margin: 0 0 18px 0;
      opacity: 0.75;
      line-height: 1.6;
      font-size: 14px;
    }
    .start-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      color: #000;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      border: 0;
      font-size: 14px;
    }
    .start-btn:active { transform: scale(0.98); }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }
  
  /* Chat UI (Display-side, hidden by default) */
  .chat-launcher {
    cursor: pointer;
    position: relative;
  }
  .chat-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    min-width: 18px;
    height: 18px;
    padding: 0 6px;
    border-radius: 999px;
    background: #EF4444;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
  }
  .chat-launcher.attn {
    border-color: rgba(239,68,68,0.55);
    box-shadow: 0 0 0 3px rgba(239,68,68,0.18);
  }
  .chat-panel {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 360px;
    max-width: 92vw;
    height: 520px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.10);
    box-shadow: 0 18px 60px rgba(0,0,0,0.25);
    border-radius: 18px;
    overflow: hidden;
    z-index: 9999;
    display: flex;
    flex-direction: column;
  }
  .chat-head {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.10);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .chat-title {
    font-weight: 700;
    font-size: 16px;
    color: rgba(0,0,0,0.9);
  }
  .chat-body {
    flex: 1;
    overflow: auto;
    padding: 12px 14px;
  }
  .chat-row {
    margin-bottom: 10px;
    font-size: 14px;
    color: rgba(0,0,0,0.9);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .chat-meta {
    font-size: 12px;
    color: rgba(0,0,0,0.55);
    margin-bottom: 2px;
  }
  .chat-row.control {
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(245,158,11,0.14);
  }
  .chat-row.control .chat-meta {
    color: rgba(0,0,0,0.70);
    font-weight: 900;
  }
  .chat-row.control .chat-text {
    font-weight: 900;
  }
  .chat-foot {
    border-top: 1px solid rgba(0,0,0,0.10);
    padding: 10px;
    display: flex;
    gap: 8px;
  }
  .chat-input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.15);
    outline: none;
    font-size: 14px;
  }
  .chat-btn {
    padding: 10px 14px;
    border-radius: 12px;
    border: 0;
    background: rgba(0,0,0,0.88);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  .chat-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .chat-form {
    padding: 12px 14px;
    border-top: 1px solid rgba(0,0,0,0.10);
  }
  .chat-form input {
    width: 100%;
    margin-top: 8px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.15);
    outline: none;
    font-size: 14px;
  }
  .chat-note {
    font-size: 13px;
    color: rgba(0,0,0,0.6);
    margin-top: 10px;
    line-height: 1.4;
  }

</style>
</head>

<body>
  <div id="app"></div>

  <div class="top-right">
    <div id="syncDot" class="pill" title="同步狀態">同步 連線中</div>
    <div id="fsBtn" class="pill" title="全螢幕 (F)">全螢幕</div>
    <div id="chatLauncher" class="pill chat-launcher" title="聊天室" style="display:none">聊天室<span id="chatBadge" class="chat-badge"></span></div>
  </div>

  <div id="chatPanel" class="chat-panel" style="display:none">
    <div class="chat-head">
      <div class="chat-title">聊天室</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="chatProfileBtn" class="pill" style="cursor:pointer;">設定</button>
        <button id="chatClose" class="pill" style="cursor:pointer;">關閉</button>
      </div>
    </div>

    <div id="chatBody" class="chat-body"></div>
    <div id="chatStatus" class="chat-note" style="margin:0; padding: 8px 14px; border-top: 1px solid rgba(0,0,0,0.10); display:none;"></div>

    <div id="chatProfile" class="chat-form" style="display:none;">
      <div style="font-weight:700; color: rgba(0,0,0,0.85);">設定名字與工作</div>
      <input id="chatProfileName" type="text" placeholder="名字" />
      <input id="chatProfileRole" type="text" placeholder="工作" />
      <button id="chatProfileSave" class="chat-btn" style="width:100%; margin-top:10px;">儲存</button>
      <div class="chat-note">儲存後會套用到你送出的聊天訊息</div>
    </div>

    <div id="chatGate" class="chat-form" style="display:none;">
      <div style="font-weight:700; color: rgba(0,0,0,0.85);">申請加入</div>
      <input id="chatName" type="text" placeholder="名字" />
      <input id="chatRole" type="text" placeholder="工作" />
      <button id="chatRequestBtn" class="chat-btn" style="width:100%; margin-top:10px;">送出申請</button>
      <div id="chatGateNote" class="chat-note">送出申請後，等待主控端允許</div>
    </div>

    <div id="chatComposer" class="chat-foot" style="display:none;">
      <input id="chatInput" class="chat-input" placeholder="輸入訊息" />
      <button id="chatSend" class="chat-btn">送出</button>
    </div>
  </div>

  <div id="startOverlay" class="start-overlay">
    <div class="start-card fade-in">
      <h1 class="start-title">EventMaster Display</h1>
      <p class="start-desc">
        點一下進入全螢幕顯示。這是瀏覽器的安全規定，必須由使用者觸發才允許全螢幕。
      </p>
      <button id="startBtn" class="start-btn">進入全螢幕</button>
      <div class="hint">快捷鍵 F 切換全螢幕</div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBK4MDqu4VxuWNAGpM9ZDw6EorHPVuAEcw",
      authDomain: "teamflow-observer.firebaseapp.com",
      databaseURL: "https://teamflow-observer-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "teamflow-observer",
      storageBucket: "teamflow-observer.firebasestorage.app",
      messagingSenderId: "368824933221",
      appId: "1:368824933221:web:e977fc04d8fce3e5e45f8c",
      measurementId: "G-YCRMSFQC45"
    };

    const EVENT_DOC_ID = "current_event_state";
    const EVENT_COLLECTION = "event_master";

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const appEl = document.getElementById("app");
    const overlayEl = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");
    const fsBtn = document.getElementById("fsBtn");
    const syncDot = document.getElementById("syncDot");

    let state = null;
    let unsub = null;
    let tickTimer = null;

    function safeTheme(theme) {
      const t = theme || {};
      return {
        mode: t.mode === "light" ? "light" : "dark",
        bgColorLight: t.bgColorLight || "#F3F4F6",
        textColorLight: t.textColorLight || "#111827",
        bgColorDark: t.bgColorDark || "#000000",
        textColorDark: t.textColorDark || "#FFFFFF",
        accentColor: t.accentColor || "#3B82F6",
        backgroundImage: t.backgroundImage || null
      };
    }

    function hexToRgba(hex, a) {
      const h = String(hex || '').replace('#','').trim();
      const full = h.length === 3 ? h.split('').map(ch => ch + ch).join('') : h;
      const r = parseInt(full.slice(0, 2) || '00', 16);
      const g = parseInt(full.slice(2, 4) || '00', 16);
      const b = parseInt(full.slice(4, 6) || '00', 16);
      const alpha = (typeof a === 'number') ? a : 1;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function nowHHMM(date) {
      return date.toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit" });
    }

    function sortSchedule(schedule) {
      return [...(schedule || [])].sort((a, b) => (a.time || "").localeCompare(b.time || ""));
    }

    function calcCurrentNext(schedule, currentTime) {
      const sorted = sortSchedule(schedule);
      const nowStr = nowHHMM(currentTime);

      let current = null;
      let next = null;

      for (let i = 0; i < sorted.length; i++) {
        const item = sorted[i];
        if (!item || !item.time) continue;

        if (nowStr >= item.time) {
          current = item;
          next = sorted[i + 1] || null;
        } else {
          if (!next) next = item;
        }
      }
      return { currentActivity: current, nextActivity: next };
    }

    function formatCountdownNoMs(ms) {
      const safeMs = Math.max(0, ms);
      // Use CEIL seconds so the display changes 11 -> 10 without showing 00:10 early.
      const totalSeconds = Math.ceil(safeMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");

      return `<span class="tabular-nums">${mm}:${ss}</span>`;
    }

    function formatStopwatchNoMs(ms) {
      const safeMs = Math.max(0, ms);
      // Stopwatch uses FLOOR seconds (standard elapsed time behavior).
      const totalSeconds = Math.floor(safeMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");

      return `<span class="tabular-nums">${mm}:${ss}</span>`;
    }

    function computeTimerMs(timer, displayMode) {
      if (!timer) return 0;
      let ms = 0;

      if (displayMode === "countdown") {
        const elapsed = timer.isRunning ? (Date.now() - (timer.startTime || Date.now())) : 0;
        ms = (timer.initialDuration || 0) - ((timer.elapsedOnPause || 0) + elapsed);
        if (ms < 0) ms = 0;
      } else if (displayMode === "stopwatch") {
        const elapsed = timer.isRunning ? (Date.now() - (timer.startTime || Date.now())) : 0;
        ms = (timer.elapsedOnPause || 0) + elapsed;
      }
      return ms;
    }

function render() {
  // 注意：這裡的 HTML 都是 template string，任何 div 的 style="..." 少一個結尾引號都會讓整個畫面壞掉
      if (!state) {
        appEl.innerHTML = "";
        return;
      }

      const currentTime = new Date();
      const theme = safeTheme(state.theme);
      const displayMode = state.displayMode || "clock";
      const showSeconds = !!state.showSeconds;
      const showFullSchedule = !!state.showFullSchedule;
      const schedule = state.schedule || [];
      const highlightedItemId = state.highlightedItemId || null;
      const scheduleTitle = (typeof state.scheduleTitle === "string") ? state.scheduleTitle : "";

      const customMessage = state.customMessage || "";
      const isMessageActive = !!state.isMessageActive;
      const isMessageMagnified = !!state.isMessageMagnified;

      const timer = state.timer || null;
      const timerLabel = state.timerLabel || "";

      const containerBg = theme.mode === "dark" ? theme.bgColorDark : theme.bgColorLight;
      const containerFg = theme.mode === "dark" ? theme.textColorDark : theme.textColorLight;

      const bgImage = theme.backgroundImage ? `url(${theme.backgroundImage})` : "none";
      const overlay = theme.backgroundImage
        ? (theme.mode === "dark" ? "rgba(0,0,0,0.60)" : "rgba(255,255,255,0.70)")
        : "transparent";

      const activityTextColor = theme.accentColor;
      const activityTextGlow = theme.mode === 'dark'
        ? `0 0 22px ${hexToRgba(theme.accentColor, 0.65)}, 0 0 48px ${hexToRgba(theme.accentColor, 0.28)}`
        : `0 0 10px ${hexToRgba(theme.accentColor, 0.18)}, 0 6px 18px rgba(0,0,0,0.10)`;
      const activityCardBg = theme.mode === 'dark' ? 'rgba(0,0,0,0.38)' : 'rgba(255,255,255,0.62)';
      const activityCardBorder = theme.mode === 'dark' ? 'rgba(255,255,255,0.14)' : 'rgba(0,0,0,0.10)';
      const activityCardShadow = theme.mode === 'dark'
        ? `0 22px 55px rgba(0,0,0,0.40), 0 0 40px ${hexToRgba(theme.accentColor, 0.12)}`
        : `0 18px 45px rgba(0,0,0,0.18), 0 0 26px ${hexToRgba(theme.accentColor, 0.10)}`;

      const { currentActivity, nextActivity } = calcCurrentNext(schedule, currentTime);
      const highlightedItem = schedule.find(i => i && i.id === highlightedItemId) || null;
      const displayActivity = highlightedItem; // only show activity when manually focused

      const isTimerMode = displayMode === "countdown" || displayMode === "stopwatch";
      const isSplitMode = showFullSchedule && !isTimerMode;

      const timerMs = computeTimerMs(timer, displayMode);

      let timeText = "";
      if (displayMode === "pureTime") {
        timeText = currentTime.toLocaleTimeString("en-US", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: showSeconds ? "2-digit" : undefined
        });
      } else if (isTimerMode) {
        timeText = "";
      } else {
        timeText = currentTime.toLocaleTimeString("en-US", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: showSeconds ? "2-digit" : undefined
        });
      }

      const clockSize = (() => {
        if (isTimerMode) return "25vw";
        if (displayMode === "pureTime") return "35vw";
        if (isSplitMode) return "15vw";
        return "18vw";
      })();

      const dateStr = currentTime.toLocaleDateString("zh-TW", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });

      const messageBlock = (customMessage && isMessageActive) ? `
        <div style="margin-bottom: 3.2vh; width: 100%; display:flex; justify-content:center">
          <div class="${isMessageMagnified ? "flash" : ""}"
               style="
                 max-width: 95%;
                 padding: ${isMessageMagnified ? "3.4vh 3.4vw" : "2.2vh 2.8vw"};
                 border-radius: 18px;
                 border: 1px solid rgba(255,255,255,0.18);
                 background: ${isMessageMagnified ? "#FCD34D" : "rgba(255,255,255,0.08)"};
                 color: ${isMessageMagnified ? "#000" : "inherit"};
                 font-weight: ${isMessageMagnified ? "900" : "600"};
                 font-size: ${isMessageMagnified ? "8vh" : "5vh"};
                 line-height: 1.15;
                 box-shadow: 0 22px 55px rgba(0,0,0,0.40);
                 backdrop-filter: blur(12px);
                 word-break: break-word;
                 text-align: center;
               ">
            ${escapeHtml(customMessage)}
          </div>
        </div>
      ` : "";

      const timerStatusText = timerLabel || (displayMode === "countdown" ? (timerMs === 0 ? "TIME UP" : "REMAINING") : "ELAPSED");
      // Stopwatch should stay plain; only show status text for countdown (and hide it at TIME UP because the big text already takes over)
      const timerStatusBlock = (displayMode === "countdown" && timerMs !== 0) ? `
        <div style="margin-top: 1.2vh; opacity:0.60; font-weight:600; letter-spacing:0.16em; font-size: 3.0vh">
          ${escapeHtml(timerStatusText)}
        </div>
      ` : "";

      const activityBlock = (!isTimerMode) ? `
        <div style="margin-top: 3.2vh; display:flex; flex-direction:column; align-items:center; gap: 1.2vh">
          ${displayActivity ? `
            <div style="
              padding: 2.2vh 3.6vw;
              border-radius: 22px;
              border: 1px solid ${activityCardBorder};
              background: ${activityCardBg};
              backdrop-filter: blur(14px);
              box-shadow: ${activityCardShadow};
              max-width: 86vw;
              text-align: center;
            ">
              <div style="
                font-size: 10.2vh;
                font-weight: 800;
                color: ${activityTextColor};
                text-shadow: ${activityTextGlow};
                letter-spacing: 0.04em;
                line-height: 1.25;
                opacity: 0.95;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              ">
                ${escapeHtml(displayActivity.title || "")}
              </div>
            </div>
          ` : ``}
          ${(!isSplitMode && nextActivity && !highlightedItem) ? `
            <div style="opacity:0.60; font-size: 2.2vh; display:flex; align-items:center; gap:10px">
              <span style="font-size: 1.6vh; letter-spacing:0.18em; border:1px solid currentColor; padding: 2px 8px; border-radius: 6px; opacity:0.70">NEXT</span>
              <span>${escapeHtml(nextActivity.time || "")} - ${escapeHtml(nextActivity.title || "")}</span>
            </div>
          ` : ""}
        </div>
      ` : "";

      const scheduleBlock = isSplitMode ? `
        <div style="height:100%; display:flex; flex-direction:column; padding: 3vh 3.2vw; overflow-y:auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch">
          <div style="
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: 5;
            opacity:0.75;
            font-weight:800;
            letter-spacing:0.22em;
            font-size: 2.0vh;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            padding: 1.8vh 0 2.2vh 0;
            margin-bottom: 2.2vh
          ">
            ${escapeHtml((scheduleTitle && scheduleTitle.trim()) ? scheduleTitle : "EVENT SCHEDULE")}
          </div>
          <div style="display:flex; flex-direction:column; gap: 1.4vh">
            ${sortSchedule(schedule).map(item => {
              if (!item) return "";
              const isHi = highlightedItemId === item.id;
              // const nowStr = nowHHMM(currentTime);
              const nowStr = nowHHMM(currentTime);
              const isPast = (item.time || "") < nowStr;
              // const isCur = isHi || (!!currentActivity && currentActivity.title === item.title && !highlightedItemId);
              const isCur = false; // do not auto-highlight by time; only manual focus highlights

              let opacity = 0.60;
              if (isHi || isCur) opacity = 1.0;
              else if (isPast) opacity = 0.30;

              const color = (isHi || isCur) ? theme.accentColor : "inherit";
              const weight = (isHi ? 900 : (isCur ? 800 : 600));

              return `
                <div style="display:flex; align-items:baseline; gap: 2.0vw; opacity:${opacity}; transform-origin:left;">
                  <div class="tabular-nums" style="font-weight:${weight}; color:${color}; font-size:${(isHi || isCur) ? '4.2vh' : '2.8vh'}; min-width: 6.5ch">
                    ${escapeHtml(item.time || "")}
                  </div>
                  <div style="font-weight:${weight}; font-size:${(isHi || isCur) ? '3.9vh' : '2.6vh'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 100%">
                    ${escapeHtml(item.title || "")}
                  </div>
                  ${isHi ? `<div style="width:10px;height:10px;border-radius:999px;background:${theme.accentColor}"></div>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        </div>
      ` : "";

      // --- Enhancement (countdown only): seconds-only, color stages, breathing, time up ---
      const isCountdown = displayMode === "countdown";
      const isStopwatch = displayMode === "stopwatch";

      const timerSec = Math.ceil(timerMs / 1000);

      // Countdown-only color stages
      let timerColor = containerFg;
      if (isCountdown && timerSec <= 10) timerColor = theme.accentColor;
      if (isCountdown && timerSec <= 5) timerColor = "#F97316";
      if (isCountdown && timerSec <= 2) timerColor = "#EF4444";

      // Countdown-only breathing and TIME UP
      const isBreathing = isCountdown && timerSec <= 5 && timerSec > 0;
      const isTimeUp = isCountdown && timerMs === 0;

      // Countdown-only: show seconds as 10,9,8... in last 10 seconds
      const showSecondsOnly = isCountdown && timerSec <= 10 && timerSec > 0;
      const secondsOnlyText = String(timerSec);
      const secondsOnlySize = "38vw";
      // --------------------------------------------------------------

      const content = (() => {
        if (displayMode === "pureTime") {
          return `
            <div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center">
              <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; text-align:center">
                ${messageBlock}
                <div class="tabular-nums optical-center" style="font-weight:900; letter-spacing:-0.06em; line-height:1; font-size: 35vw; user-select:none">
                  ${escapeHtml(timeText)}
                </div>
                <div style="margin-top: 1.8vh; font-weight:600; letter-spacing:0.16em; opacity:0.80; font-size: 5vw">
                  ${escapeHtml(dateStr)}
                </div>
              </div>
            </div>
          `;
        }

        // Timer block: refactored for countdown/stopwatch effects
        const timeBlock = isTimerMode
          ? `
            <div class="optical-center ${isBreathing ? 'breathe' : ''}" 
                 style="font-weight:900; letter-spacing:-0.06em; line-height:1; font-size:${showSecondsOnly ? secondsOnlySize : clockSize}; user-select:none; color:${isCountdown ? timerColor : 'inherit'}">
              ${isTimeUp ? 'TIME UP' : (showSecondsOnly ? escapeHtml(secondsOnlyText) : (isCountdown ? formatCountdownNoMs(timerMs) : formatStopwatchNoMs(timerMs)))}
            </div>`
          : `<div class="tabular-nums optical-center" style="font-weight:900; letter-spacing:-0.06em; line-height:1; font-size:${clockSize}; user-select:none">${escapeHtml(timeText)}</div>`;

        if (isSplitMode) {
          return `
            <div style="width:100%; height:100%; display:flex">
              <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 4vh 3vw; border-right: 1px solid rgba(255,255,255,0.12); text-align:center">
                ${messageBlock}
                ${timeBlock}
                ${activityBlock}
              </div>
              <div style="flex:1; height:100%; background: rgba(0,0,0,0.45)">
                ${scheduleBlock}
              </div>
            </div>
          `;
        }

        return `
          <div class="optical-center" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 4vh 3vw; text-align:center">
            ${messageBlock}
            ${timeBlock}
            ${timerStatusBlock}
            ${activityBlock}
          </div>
        `;
      })();

      const logoBlock = (displayMode !== "pureTime") ? `
        <div style="position:fixed; left:0; right:0; bottom: 3.2vh; text-align:center; font-size: 12px; opacity:0.28; letter-spacing:0.28em; font-weight:600">
          桑尼娛樂
        </div>
      ` : "";

      appEl.innerHTML = `
        <div style="
          position:fixed; inset:0;
          background-color:${containerBg};
          color:${containerFg};
          background-image:${bgImage};
          background-size:cover;
          background-position:center;
          background-repeat:no-repeat;
        ">
          <div style="position:fixed; inset:0; background:${overlay}"></div>

          ${theme.backgroundImage ? "" : `
            <div style="position:fixed; inset:0; opacity:0.30; pointer-events:none">
              <div style="position:absolute; top:-20%; left:-10%; width:50vw; height:50vw; border-radius:999px; filter:blur(120px); background:${theme.accentColor}"></div>
              <div style="position:absolute; bottom:-20%; right:-10%; width:60vw; height:60vw; border-radius:999px; filter:blur(150px); background:${theme.mode === "dark" ? "#333" : "#fff"}"></div>
            </div>
          `}

          <div style="position:relative; z-index:10; width:100%; height:100%">
            ${content}
          </div>

          ${logoBlock}
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (e) {
      }
    }

    function setSync(ok, text) {
      syncDot.textContent = text || (ok ? "同步 已連線" : "同步 連線中");
      syncDot.style.background = ok ? "rgba(16,185,129,0.22)" : "rgba(239,68,68,0.22)";
      syncDot.style.borderColor = ok ? "rgba(16,185,129,0.35)" : "rgba(239,68,68,0.35)";
    }

    function startTick() {
      if (tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(() => {
        if (!state) return;
        render();
      }, 250);
    }

    function connect() {
      setSync(false, "同步 連線中");

      auth.signInAnonymously()
        .then(() => {
          try { myUid = auth.currentUser ? auth.currentUser.uid : null; } catch (e) { myUid = null; }
          loadChatProfile();

          unsub = db.collection(EVENT_COLLECTION).doc(EVENT_DOC_ID).onSnapshot((doc) => {
            setSync(true, "同步 已連線");
            if (doc.exists) {
              const data = doc.data() || {};
              state = {
                scheduleTitle: "",
                ...data
              };
              updateChatAvailability();
              render();
            } else {
              setSync(false, "同步 找不到資料");
            }
          }, (err) => {
            setSync(false, "同步 錯誤");
          });

          startTick();
        })
        .catch(() => {
          setSync(false, "同步 登入失敗");
        });
    }

    startBtn.addEventListener("click", async () => {
      await toggleFullscreen();
      overlayEl.style.display = "none";
    });

    fsBtn.addEventListener("click", async () => {
      await toggleFullscreen();
    });

    window.addEventListener("keydown", (e) => {
      const key = (e.key || "").toLowerCase();
      // Preset quick keys 1–9: write through Cloud Sync immediately
      if (e.key >= '1' && e.key <= '9') {
        // Find preset text for this key, if any
        if (!state || !Array.isArray(state.quickMessages)) return;
        const idx = parseInt(e.key, 10) - 1;
        const text = state.quickMessages[idx] || "";
        // updateState will immediately write to Cloud Sync (Firestore)
        updateState({
          customMessage: text,
          isMessageActive: true,
          // force projector to re-render even if the same text is chosen repeatedly
          messageUpdatedAt: Date.now(),
          // If there are other message-related flags to set, add them here if needed
        });
        return;
      }
      if (key === "f") {
        e.preventDefault();
        toggleFullscreen();
        if (overlayEl.style.display !== "none") overlayEl.style.display = "none";
      }
    });
    // Update state and sync to Firestore
    function updateState(newFields) {
      if (!state) return;
      const updated = { ...state, ...newFields };
      // Write to Firestore immediately
      db.collection(EVENT_COLLECTION).doc(EVENT_DOC_ID).set(updated, { merge: true });
      // Also update local state and re-render
      state = updated;
      render();
    }

    window.addEventListener("dblclick", () => {
      toggleFullscreen();
      if (overlayEl.style.display !== "none") overlayEl.style.display = "none";
    });

    document.addEventListener("fullscreenchange", () => {
      fsBtn.textContent = document.fullscreenElement ? "離開全螢幕" : "全螢幕";
    });

    
    // --- Chat (Display-side) ---
    const chatLauncher = document.getElementById("chatLauncher");
    const chatBadge = document.getElementById("chatBadge");
    const chatPanel = document.getElementById("chatPanel");
    const chatClose = document.getElementById("chatClose");
    const chatBody = document.getElementById("chatBody");
    const chatGate = document.getElementById("chatGate");
    const chatName = document.getElementById("chatName");
    const chatRole = document.getElementById("chatRole");
    const chatRequestBtn = document.getElementById("chatRequestBtn");
    const chatComposer = document.getElementById("chatComposer");
    const chatInput = document.getElementById("chatInput");
    const chatSend = document.getElementById("chatSend");
    const chatStatus = document.getElementById("chatStatus");
    const chatProfileBtn = document.getElementById("chatProfileBtn");
    const chatProfile = document.getElementById("chatProfile");
    const chatProfileName = document.getElementById("chatProfileName");
    const chatProfileRole = document.getElementById("chatProfileRole");
    const chatProfileSave = document.getElementById("chatProfileSave");

    let chatUnsub = null;
    let myUid = null;
    let myApproved = false;
    let requested = false;
    let unseenCount = 0;
    let lastSeenMs = parseInt(localStorage.getItem("tf_chat_last_seen_ms") || "0", 10) || 0;

    function loadChatProfile() {
      const n = localStorage.getItem("tf_chat_name") || "";
      const r = localStorage.getItem("tf_chat_role") || "";
      chatName.value = n;
      chatRole.value = r;
      chatProfileName.value = n;
      chatProfileRole.value = r;
    }

    function saveChatProfile() {
      const n = (chatProfileName.value || chatName.value || "").trim();
      const r = (chatProfileRole.value || chatRole.value || "").trim();
      localStorage.setItem("tf_chat_name", n);
      localStorage.setItem("tf_chat_role", r);
      chatName.value = n;
      chatRole.value = r;
      chatProfileName.value = n;
      chatProfileRole.value = r;
    }

    function setChatStatus(message) {
      if (!chatStatus) return;
      const msg = (message || "").trim();
      if (!msg) {
        chatStatus.style.display = "none";
        chatStatus.textContent = "";
        return;
      }
      chatStatus.style.display = "block";
      chatStatus.textContent = msg;
    }

    function setChatBadge(count) {
      if (!chatBadge || !chatLauncher) return;
      const n = Math.max(0, parseInt(count || 0, 10) || 0);
      if (n <= 0) {
        chatBadge.style.display = "none";
        chatBadge.textContent = "";
        chatLauncher.classList.remove("attn");
        return;
      }
      chatBadge.style.display = "inline-flex";
      chatBadge.textContent = String(n > 99 ? 99 : n);
      chatLauncher.classList.add("attn");
    }

    function markChatSeen() {
      lastSeenMs = Date.now();
      localStorage.setItem("tf_chat_last_seen_ms", String(lastSeenMs));
      unseenCount = 0;
      setChatBadge(0);
    }

    function openChat() {
      chatPanel.style.display = "flex";
      // lazy subscribe
      if (!chatUnsub) startChatSub();
      refreshChatGate();
      markChatSeen();
      // status already handled by refreshChatGate
    }

    function closeChat() {
      markChatSeen();
      chatPanel.style.display = "none";
    }

    chatClose.addEventListener("click", closeChat);
    chatLauncher.addEventListener("click", openChat);

    chatProfileBtn.addEventListener("click", () => {
      const isOpen = chatProfile.style.display !== "none";
      chatProfile.style.display = isOpen ? "none" : "block";
      if (!isOpen) loadChatProfile();
    });

    chatProfileSave.addEventListener("click", () => {
      saveChatProfile();
      setChatStatus("已儲存名字與工作");
      setTimeout(() => setChatStatus(""), 1200);
      chatProfile.style.display = "none";
    });

    function renderChatMessages(list) {
      chatBody.innerHTML = "";
      if (!list || list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "chat-row";
        empty.style.color = "rgba(0,0,0,0.5)";
        empty.textContent = "目前沒有訊息";
        chatBody.appendChild(empty);
        return;
      }
      for (const m of list) {
        const row = document.createElement("div");

        const nameStr = String((m && m.name) || "");
        const roleStr = String((m && m.role) || "");
        const uidStr = String((m && m.uid) || "");
        const controlUid = state && state.controlUid ? String(state.controlUid) : "";

        const keywordHit = /主控|控台|音控|主持/.test(nameStr + " " + roleStr);
        const isControl = !!(m && m.isControl) || (controlUid && uidStr && uidStr === controlUid) || keywordHit;

        row.className = isControl ? "chat-row control" : "chat-row";

        const meta = document.createElement("div");
        meta.className = "chat-meta";
        const displayName = (m && m.name) ? String(m.name) : "未命名";
        const alreadyPrefixed = /^\s*主控/.test(displayName);
        meta.textContent = ((isControl && !alreadyPrefixed) ? "主控 " : "") + displayName + (m.role ? (" " + m.role) : "");

        const text = document.createElement("div");
        text.className = isControl ? "chat-text" : "";
        text.textContent = m.text || "";

        row.appendChild(meta);
        row.appendChild(text);
        chatBody.appendChild(row);
      }
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function startChatSub() {
      const msgRef = db
        .collection(EVENT_COLLECTION)
        .doc(EVENT_DOC_ID)
        .collection("chat_messages")
        .orderBy("createdAt", "asc")
        .limit(200);

      chatUnsub = msgRef.onSnapshot((snap) => {
        const list = [];
        snap.forEach((d) => list.push({ id: d.id, ...d.data() }));
        renderChatMessages(list);

        const panelOpen = chatPanel && chatPanel.style.display !== "none";
        if (panelOpen) {
          markChatSeen();
          return;
        }

        const unseen = list.filter((msg) => {
          const t = (msg && typeof msg.createdAtMs === "number") ? msg.createdAtMs : 0;
          return t > lastSeenMs;
        }).length;

        unseenCount = unseen;
        setChatBadge(unseenCount);
      });
    }

    async function requestChatAccess() {
      if (!myUid) return;

      const n = (chatName.value || "").trim();
      const r = (chatRole.value || "").trim();

      if (!n) {
        alert("請輸入名字");
        return;
      }

      saveChatProfile();

      const payload = {
        uid: myUid,
        name: n,
        role: r,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdAtMs: Date.now()
      };

      requested = true;
      setChatStatus("申請送出中...");

      // use uid as doc id to avoid duplicates
      await db
        .collection(EVENT_COLLECTION)
        .doc(EVENT_DOC_ID)
        .collection("chat_requests")
        .doc(myUid)
        .set(payload, { merge: true });

      setChatStatus("已送出申請，等待主控端允許");
      chatRequestBtn.textContent = "已送出";
      chatRequestBtn.disabled = true;

      refreshChatGate();
    }

    chatRequestBtn.addEventListener("click", requestChatAccess);

    async function sendChat() {
      if (!myUid || !myApproved) return;

      const n = (localStorage.getItem("tf_chat_name") || "").trim();
      const r = (localStorage.getItem("tf_chat_role") || "").trim();
      const m = (chatInput.value || "").trim();

      if (!n) {
        alert("請先填名字");
        openChat();
        return;
      }

      if (!m) return;

      const payload = {
        uid: myUid,
        name: n,
        role: r,
        text: m,
        isControl: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdAtMs: Date.now()
      };

      chatInput.value = "";

      await db
        .collection(EVENT_COLLECTION)
        .doc(EVENT_DOC_ID)
        .collection("chat_messages")
        .add(payload);
    }

    chatSend.addEventListener("click", sendChat);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    function refreshChatGate() {
      if (!state || !state.chatEnabled) {
        chatGate.style.display = "none";
        chatComposer.style.display = "none";
        chatProfile.style.display = "none";
        setChatStatus("");
        return;
      }

      const allow = state.chatAllowedUids || {};
      myApproved = !!(myUid && allow && allow[myUid]);

      if (myApproved) {
        chatGate.style.display = "none";
        chatComposer.style.display = "flex";
        // if previously disabled, keep it disabled
        chatRequestBtn.disabled = true;
        setChatStatus("已獲得允許，可以開始聊天");
      } else {
        chatGate.style.display = "block";
        chatComposer.style.display = "none";
        // if user already requested once, keep the UI in waiting state
        if (requested) {
          chatRequestBtn.textContent = "已送出";
          chatRequestBtn.disabled = true;
          setChatStatus("已送出申請，等待主控端允許");
        } else {
          chatRequestBtn.textContent = "送出申請";
          chatRequestBtn.disabled = false;
          setChatStatus("請先送出申請");
        }
      }
    }

    function updateChatAvailability() {
      // default hidden
      if (!state || !state.chatEnabled) {
        chatLauncher.style.display = "none";
        if (chatPanel.style.display !== "none") closeChat();
        return;
      }

      // if enabled, show launcher
      chatLauncher.style.display = "inline-flex";
      refreshChatGate();
    }


    connect();
  </script>


</body>
</html>
